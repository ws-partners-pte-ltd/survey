<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSP Radar</title>

    <!-- Favicon設定 -->
    <link rel="icon" href="/favicon.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', '"Noto Sans JP"', 'sans-serif'] },
                    colors: {
                        art: {
                            bg: '#ffffff', text: '#1f2937', muted: '#6b7280',
                            border: 'rgba(26, 42, 79, 0.18)',
                            accentYellow: '#c8941f', accentPeach: '#c8714a', accentGreen: '#2a9d8f',
                        }
                    },
                    backgroundImage: { 'gradient-art': 'linear-gradient(to right, #1a2a4f, #466eb3, #2a9d8f)' }
                }
            }
        }
    </script>

    <script crossorigin src="/assets/react.production.min.js"></script>
    <script crossorigin src="/assets/react-dom.production.min.js"></script>

    <!-- ★外部ファイル (config.js) の読み込み -->
    <script src="./config.js" onerror="window.configLoadError = true;"></script>
    <style>
        body { background-color: #ffffff; color: #1f2937; overflow-x: hidden; }
        .text-gradient {
            background: linear-gradient(90deg, #c8941f 0%, #e0a93e 50%, #c8941f 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; color: transparent;
        }
        .radar-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100vmin; height: 100vmin; max-width: 900px; max-height: 900px;
            pointer-events: none; z-index: 0; transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: center; justify-content: center;
        }
        @media (min-width: 768px) { .radar-container { left: 65%; } }
        .radar-container.top-mode { opacity: 0.9; transform: translate(-50%, -50%) scale(1.1); }
        .radar-container.survey-mode { opacity: 0.12; transform: translate(-50%, -50%) scale(1.3); filter: blur(12px); }
        .radar-sweep {
            position: absolute; inset: 10%; border-radius: 50%;
            background: conic-gradient(from 0deg, #ff0055, #ffaa00, #aaff00, #00ffaa, #00aaff, #aa00ff, #ff0055);
            animation: spin 10s linear infinite; mask-image: radial-gradient(circle, transparent 20%, black 50%, transparent 70%);
            -webkit-mask-image: -webkit-radial-gradient(circle, transparent 20%, black 50%, transparent 70%);
            opacity: 0.85; mix-blend-mode: normal;
        }
        .radar-circle { position: absolute; border-radius: 50%; border: 1px solid rgba(26, 42, 79, 0.08); }
        .radar-pulse-ring {
            position: absolute; border-radius: 50%; border: 2px solid transparent;
            animation: pulse-ring 8s cubic-bezier(0.1, 0.7, 0.3, 1) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse-ring {
            0% { width: 10%; height: 10%; opacity: 1; border-color: rgba(255, 170, 0, 0.8); }
            50% { border-color: rgba(0, 255, 170, 0.6); }
            100% { width: 90%; height: 90%; opacity: 0; border-color: rgba(255, 0, 102, 0); }
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col font-sans relative">
    <div id="root" class="flex-1 flex flex-col w-full h-full"></div>
    <script src="app.js"></script>
</body>
</html>
